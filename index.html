<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTDM Review</title>
    <style>
      @font-face {
        font-family: 'ZhuoKai';
        src: url('/cut.woff2') format('woff2');
        font-display: swap;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      button, input, select, textarea { font-family: inherit; }
      :root {
        /* Palette — ordered by coverage area (largest → smallest) */
        --bg-rgb: 44,54,57;     /* #2C3639 — page background */
        --o-deep: 44,54,57;     /* #2C3639 — inset wells, inputs */
        --o-mid:  63,78,79;     /* #3F4E4F — card base */
        --o-bright: 162,123,92; /* #A27B5C — accent */
        --fg-rgb: 220,215,201;  /* #DCD7C9 — text */
      }
      body {
        background: rgb(var(--bg-rgb));
        color: rgb(var(--fg-rgb));
        font-family: 'ZhuoKai', sans-serif;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
