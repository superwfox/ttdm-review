<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTDM Review</title>
    <style>
      @font-face {
        font-family: 'ZhuoKai';
        src: url('/jiangxizhuokai-ascii-plus.woff2') format('woff2');
        font-display: swap;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg-rgb: 0,0,0;
        --fg-rgb: 255,236,212;
        /* Orange palette — three brightness levels */
        --o-deep: 32,18,8;      /* darkest — inputs, deep wells */
        --o-mid:  92,48,18;     /* card base */
        --o-bright: 255,140,48; /* accent — buttons, highlights */
      }
      body {
        background: rgb(var(--bg-rgb));
        color: rgb(var(--fg-rgb));
        font-family: 'ZhuoKai', sans-serif;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
